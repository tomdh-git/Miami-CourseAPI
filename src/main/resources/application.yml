spring:
  application:
    name: courseapi
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 0
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      show-details: always

# ── CourseAPI application settings ──────────────────────────────────
courseapi:
  cache:
    ttl-minutes: 60
    max-size: 1000
  graphql:
    max-query-depth: 10
    default-result-limit: 100
  schedule:
    max-combinator-results: 100

# ── School connector settings ──────────────────────────────────────
miami:
  api:
    url: ${MIAMI_API_URL:https://www.apps.miamioh.edu/courselist/}
    token-timeout-ms: 45000
    html-cache-timeout-ms: 30000
    fields-cache-timeout-ms: 3600000
    request-timeout-ms: 28000
    token-refresh-threshold-ms: 35000
    connect-timeout-ms: 30000
    read-write-timeout-sec: 60